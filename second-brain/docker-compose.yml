# Docker Compose — Second Brain (all services local)
# Chạy Ollama + Qdrant + App trong Docker, không cài global
#
# Usage:
#   docker compose up -d qdrant ollama   # Start services
#   docker compose exec ollama ollama pull qwen2.5:7b-instruct-q4_K_M  # Download model
#   python -m uvicorn backend.main:app --reload  # Start app (local Python)
#
# Full Docker (including app):
#   docker compose up -d

services:
  # --- Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./docker-data/qdrant:/qdrant/storage
    restart: unless-stopped

  # --- LLM Runtime ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./docker-data/ollama:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if you have NVIDIA GPU + nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes: {}
